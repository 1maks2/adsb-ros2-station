services:
  ros2client:
    container_name: ros2_jazzy_lpa
    build: .
    working_dir: /ros2_ws
    stdin_open: true
    tty: true
    network_mode: host
    privileged: true
    environment:
      - ROS_VERSION=2
      - ROS_PYTHON_VERSION=3
      - ROS_DOMAIN_ID=0
      - ROS_DISTRO=jazzy
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - ./ros2_ws:/ros2_ws
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
      - "/dev/ttyAMA0:/dev/ttyAMA0"
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/mem:/dev/mem"
    entrypoint: ["/bin/bash"]
    command: ["/ros2_ws/start_nodes.sh"]
